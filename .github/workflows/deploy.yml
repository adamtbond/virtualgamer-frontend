name: Deploy Backend

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 77.68.122.45 >> ~/.ssh/known_hosts

      - name: Deploy backend on VPS
        run: |
          tar --exclude='.git' --exclude='target' --exclude='.env' -czf - . | ssh deploy@77.68.122.45 '
            set -euo pipefail

            APP_DIR=/opt/FirstServerAPI
            mkdir -p "$APP_DIR"

            find "$APP_DIR" -mindepth 1 ! -name .env -exec rm -rf {} +
            tar -xzf - -C "$APP_DIR"
          '

          ssh deploy@77.68.122.45 << 'EOF'
            set -euo pipefail

            APP_DIR=/opt/FirstServerAPI
            cd "$APP_DIR"

            if [ ! -f .env ]; then
              echo "Missing /opt/FirstServerAPI/.env. Create it from .env.example before deploying."
              exit 1
            fi

            chmod +x mvnw
            ./mvnw package -DskipTests

            docker builder prune -af || true
            docker compose build --no-cache api
            docker compose up -d --remove-orphans
          EOF
